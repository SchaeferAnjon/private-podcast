<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>On Your Way · 听懂世界</title>
  <meta name="description" content="这个播客是一个帮助你把文字变成声音，并且随身聆听定制化内容的地方。"/>
  <link rel="alternate" type="application/rss+xml" title="On Your Way" href="podcast.xml"/>
  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #f2efe9;
      color: #1a1a2e;
      line-height: 1.6;
    }
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .cover {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      background: center/cover no-repeat url('cover.jpg');
    }
    h1 {
      font-size: 2.2rem;
      margin: 32px 0 8px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .tagline {
      color: #555;
      margin: 0 0 24px;
      font-size: 1.1rem;
    }
    .feed-box {
      background: #fff;
      border: 1px solid #e2ddd2;
      border-radius: 12px;
      padding: 20px;
      margin: 24px 0;
    }
    .feed-box code {
      display: block;
      padding: 10px 12px;
      background: #f6f3ec;
      border-radius: 6px;
      font-size: 0.9rem;
      word-break: break-all;
      color: #4a3f2a;
    }
    .feed-box button {
      background: #1a1a2e;
      color: #FFE27A;
      border: 0;
      padding: 10px 18px;
      border-radius: 8px;
      margin-top: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .episode {
      border-top: 1px solid #e2ddd2;
      padding-top: 24px;
      margin-top: 32px;
    }
    .episode h2 { margin: 0 0 6px; font-size: 1.25rem; }
    .episode .meta { color: #888; font-size: 0.9rem; margin: 0 0 12px; }
    audio { width: 100%; }
    footer { color: #888; font-size: 0.85rem; margin-top: 64px; }
    footer a { color: #4a3f2a; }
  </style>
</head>
<body>
  <main>
    <div class="cover" role="img" aria-label="On Your Way cover"></div>
    <h1>On Your Way · 听懂世界</h1>
    <p class="tagline">这个播客是一个帮助你把文字变成声音，并且随身聆听定制化内容的地方。</p>

    <div class="feed-box">
      <strong>订阅 RSS：</strong>
      <code id="feed">https://schaeferanjon.github.io/private-podcast/podcast.xml</code>
      <button onclick="navigator.clipboard.writeText(document.getElementById('feed').textContent)">复制链接</button>
    </div>

    <section class="episode">
      <h2>001 · 足球入门：听懂朋友聊球所需要的一切</h2>
      <p class="meta">2026-04-20 · 28:43</p>
      <audio controls preload="none"
        src="https://github.com/SchaeferAnjon/private-podcast/releases/download/ep001/ep001_football.mp3"></audio>
    </section>

    <footer>
      <p>Made with Claude Code + MiniMax TTS. <a href="https://github.com/SchaeferAnjon/private-podcast">source on GitHub</a>.</p>
    </footer>
  </main>
</body>
</html>
