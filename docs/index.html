<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>On Your Way · 听懂世界</title>
  <meta name="description" content="这个播客是一个帮助你把文字变成声音，并且随身聆听定制化内容的地方。"/>
  <link rel="alternate" type="application/rss+xml" title="On Your Way" href="podcast.xml"/>
  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #f2efe9;
      color: #1a1a2e;
      line-height: 1.6;
    }
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .cover {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      background: center/cover no-repeat url('cover.jpg');
    }
    h1 {
      font-size: 2.2rem;
      margin: 32px 0 8px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .tagline {
      color: #555;
      margin: 0 0 24px;
      font-size: 1.1rem;
    }
    .feed-box {
      background: #fff;
      border: 1px solid #e2ddd2;
      border-radius: 12px;
      padding: 20px;
      margin: 24px 0;
    }
    .feed-box code {
      display: block;
      padding: 10px 12px;
      background: #f6f3ec;
      border-radius: 6px;
      font-size: 0.9rem;
      word-break: break-all;
      color: #4a3f2a;
    }
    .feed-box button {
      background: #1a1a2e;
      color: #FFE27A;
      border: 0;
      padding: 10px 18px;
      border-radius: 8px;
      margin-top: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .episode {
      border-top: 1px solid #e2ddd2;
      padding-top: 24px;
      margin-top: 32px;
    }
    .episode h2 { margin: 0 0 6px; font-size: 1.25rem; }
    .episode .meta { color: #888; font-size: 0.9rem; margin: 0 0 8px; }
    .episode .summary { color: #444; margin: 0 0 14px; font-size: 0.95rem; }
    audio { width: 100%; }
    .loading { color: #999; text-align: center; padding: 40px 0; }
    footer { color: #888; font-size: 0.85rem; margin-top: 64px; }
    footer a { color: #4a3f2a; }
  </style>
</head>
<body>
  <main>
    <div class="cover" role="img" aria-label="On Your Way cover"></div>
    <h1 id="pcTitle">On Your Way · 听懂世界</h1>
    <p class="tagline" id="pcTag">这个播客是一个帮助你把文字变成声音，并且随身聆听定制化内容的地方。</p>

    <div class="feed-box">
      <strong>订阅 RSS：</strong>
      <code id="feed">https://schaeferanjon.github.io/private-podcast/podcast.xml</code>
      <button onclick="navigator.clipboard.writeText(document.getElementById('feed').textContent)">复制链接</button>
    </div>

    <div id="episodes" class="loading">加载集数中…</div>

    <footer>
      <p>Made with Claude Code + MiniMax TTS. <a href="https://github.com/SchaeferAnjon/private-podcast">source on GitHub</a>.</p>
    </footer>
  </main>

  <script>
    function fmtDuration(sec) {
      const m = Math.floor(sec / 60), s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }
    function fmtDate(iso) {
      return iso.slice(0, 10);
    }
    fetch('episodes.json', {cache: 'no-store'})
      .then(r => r.json())
      .then(data => {
        document.getElementById('pcTitle').textContent = data.podcast.title;
        document.getElementById('pcTag').textContent = data.podcast.subtitle;
        document.getElementById('feed').textContent = data.podcast.feed_url;

        const container = document.getElementById('episodes');
        container.classList.remove('loading');
        container.innerHTML = '';

        const sorted = [...data.episodes].sort((a, b) => b.num - a.num);
        for (const ep of sorted) {
          const node = document.createElement('section');
          node.className = 'episode';
          node.innerHTML = `
            <h2>${String(ep.num).padStart(3, '0')} · ${ep.title}</h2>
            <p class="meta">${fmtDate(ep.published_at)} · ${fmtDuration(ep.duration_sec)}</p>
            ${ep.summary ? `<p class="summary">${ep.summary}</p>` : ''}
            <audio controls preload="none" src="${ep.mp3_url}"></audio>`;
          container.appendChild(node);
        }
      })
      .catch(err => {
        document.getElementById('episodes').textContent = '加载集数失败：' + err.message;
      });
  </script>
</body>
</html>
